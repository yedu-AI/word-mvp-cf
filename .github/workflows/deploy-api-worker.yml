name: Deploy API Worker

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-api-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Cloudflare secrets
        id: secrets-check
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets missing, skip deployment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck API
        if: steps.secrets-check.outputs.ready == 'true'
        run: npm run typecheck -w @word-mvp/api

      - name: Deploy to Cloudflare Workers
        if: steps.secrets-check.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --config wrangler.toml
